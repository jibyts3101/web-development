<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student form</title>
</head>
<body>
    <h1>Student form</h1>
    <form action="" autocomplete="off" method="get">

        <fieldset>
            <legend>student form</legend>

            <label for="sname">student name</label>
            <input type="text" placeholder="Enter your name" id="sname" name="stuname" value="Jiby Ts">
            <br><br>
            <label for="sphone">phone number</label>
            <input type="tel" placeholder="Enter your phone number" id="sphone" name="phno" maxlength="10">
            <br><br>
            <label for="pass">password</label>
            <input type="password" placeholder="Enter password" id="pass" name="stupass" minlength="8">
            <br><br>
            <label for="age">age</label>
            <input type="number" name="stuage" id="age" placeholder="enter your age">
            <br><br>
            <label for="email">Email</label>
            <input type="email" name="stuemail" id="email" placeholder="enter your email" value="student@gmail.com"> <br><br>
            <label for="">Subjects</label> <br><br>
            <label for="html">HTML</label>
            <input type="checkbox" id="html" name="html" value="html">
            <label for="css">CSS</label>
            <input type="checkbox" name="css" id="css" value="css">
            <label for="js">JAVASCRIPT</label>
            <input type="checkbox" name="javascript" id="js" value="javascript"><br><br>
            <label for="">Gender</label><br><br>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="male" value="male">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="others">others</label>
            <input type="radio" name="gender" id="others" value="others"><br><br>
            <label for="add">Address</label><br><br>
            <textarea name="address" id="add" cols="30" rows="10" placeholder="enter your Address"></textarea>
            <br><br>
            <label for="course">Select any one course</label><br><br>
            <select name="course" id="course">
                <option value="">select one course</option>
                <option value="java fullstack">java fullstack</option>
                <option value="python fullstack">python fullstack</option>
                <option value="mern">Mern</option>
            </select><br><br>
            <label for="dob">enter your Dob</label>
            <input type="date" name="Dob" id="dob">
            
        
            <br><br>
            <button>submit</button>
            <button type="reset">reset</button>
            
        </fieldset>

    </form>
    
</body>
</html>
