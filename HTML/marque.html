<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Marquee tag</title>
        <style>
            marquee{
                border: 3px solid;
            }
        </style>
    </head>
    <body>
        
        <marquee behavior="alternate" direction="" scrollamount="15">
            <h1>Breaking news: Rcb reach to final🏆🏆</h1>

</body>
</html>
